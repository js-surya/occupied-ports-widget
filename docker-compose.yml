services:
  occupied-ports-docker-proxy:
    image: tecnativa/docker-socket-proxy:0.4.1
    container_name: occupied-ports-docker-proxy
    environment:
      CONTAINERS: 1
      POST: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  occupied-ports-widget:
    build: .
    container_name: occupied-ports-widget
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 100
    mem_limit: 128m
    cpus: 0.50
    environment:
      CACHE_SECONDS: 5
      MIN_PORT: 1
      MAX_PORT: 65535
      SORT_MODE: asc
      SHOW_SOURCE: false
      LINK_SCHEME: http
      LINK_HOST: helbuntu.ghost-hadar.ts.net
      AUTH_ENABLED: false
      WIDGET_TOKEN:
      DEBUG_ERRORS: false
      RATE_LIMIT_PER_MINUTE: 120
      TRUST_PROXY: false

      # Public-safe preset (recommended when exposed beyond tailnet):
      # AUTH_ENABLED: true
      # WIDGET_TOKEN: change-me-long-random-token
      # RATE_LIMIT_PER_MINUTE: 30
      # DEBUG_ERRORS: false
      # TRUST_PROXY: true
    ports:
      - "8789:8789"
    depends_on:
      - occupied-ports-docker-proxy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8789/health', timeout=2)"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s
    restart: unless-stopped
