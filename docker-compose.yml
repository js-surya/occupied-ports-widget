services:
  occupied-ports-docker-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: occupied-ports-docker-proxy
    environment:
      CONTAINERS: 1
      POST: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  occupied-ports-widget:
    build: .
    container_name: occupied-ports-widget
    ports:
      - "8789:8789"
    depends_on:
      - occupied-ports-docker-proxy
    restart: unless-stopped
